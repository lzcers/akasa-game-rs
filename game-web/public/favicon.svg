<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">阿卡夏笔记图标</title>
  <desc id="desc">A minimal infinity mark built from intersecting circular loops for Akasha Notes, tuned for dark backgrounds at 28 pixels.</desc>
  <defs>
    <linearGradient id="ringInk" x1="98" y1="118" x2="414" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0B8"/>
      <stop offset="0.45" stop-color="#78E6C1"/>
      <stop offset="1" stop-color="#49A8FF"/>
    </linearGradient>
    <radialGradient id="quietGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(210 210)">
      <stop offset="0" stop-color="#7FF0CF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#49A8FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softAura" x="-28%" y="-28%" width="156%" height="156%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#06080D"/>
  <rect x="20" y="20" width="472" height="472" rx="82" fill="none" stroke="#1A2530" stroke-width="14"/>
  <circle cx="256" cy="256" r="208" fill="url(#quietGlow)"/>

  <circle cx="182" cy="256" r="88" fill="none" stroke="#7FF0CF" stroke-opacity="0.24" stroke-width="40" filter="url(#softAura)"/>
  <circle cx="330" cy="256" r="88" fill="none" stroke="#49A8FF" stroke-opacity="0.24" stroke-width="40" filter="url(#softAura)"/>

  <circle cx="182" cy="256" r="88" fill="none" stroke="url(#ringInk)" stroke-width="24"/>
  <circle cx="330" cy="256" r="88" fill="none" stroke="url(#ringInk)" stroke-width="24"/>

  <path d="M142 210C171 229 209 250 256 256C303 262 341 283 370 302" fill="none" stroke="url(#ringInk)" stroke-width="11" stroke-linecap="round"/>
  <path d="M142 302C171 283 209 262 256 256C303 250 341 229 370 210" fill="none" stroke="url(#ringInk)" stroke-width="11" stroke-linecap="round"/>

  <circle cx="256" cy="256" r="9" fill="#FFF0B8"/>
  <path d="M256 224L264 246L288 256L264 266L256 288L248 266L224 256L248 246Z" fill="#FFF0B8"/>
  <text x="255" y="248"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Palatino Linotype', 'Times New Roman', Georgia, serif"
    font-size="40"
    font-weight="900"
    fill="#06080D">α</text>

  <circle cx="256" cy="168" r="6" fill="#FFF0B8" stroke="#06080D" stroke-width="2"/>
  <circle cx="182" cy="344" r="6" fill="#78E6C1" stroke="#06080D" stroke-width="2"/>
  <circle cx="330" cy="344" r="6" fill="#49A8FF" stroke="#06080D" stroke-width="2"/>
</svg>
