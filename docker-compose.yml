services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  server:
    build:
      context: ..
      dockerfile: ./akashic/server/Dockerfile
      secrets:
        - cargo_config
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3001"
    environment:
      RUST_LOG: info
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AKASHIC_MODEL: ${AKASHIC_MODEL:-deepseek-v4-flash}
      AKASHIC_HTTP_TIMEOUT_SECS: ${AKASHIC_HTTP_TIMEOUT_SECS:-660}
      AKASHIC_TASK_TIMEOUT_SECS: ${AKASHIC_TASK_TIMEOUT_SECS:-}
      AKASHIC_TASK_INITIAL_OUTPUT_TIMEOUT_SECS: ${AKASHIC_TASK_INITIAL_OUTPUT_TIMEOUT_SECS:-}
      AKASHIC_TASK_NO_PROGRESS_TIMEOUT_SECS: ${AKASHIC_TASK_NO_PROGRESS_TIMEOUT_SECS:-}
      AKASHIC_TASK_MAX_RETRIES: ${AKASHIC_TASK_MAX_RETRIES:-}
    volumes:
      - ./server/db-data:/app/db-data

volumes:
  caddy_data:
  caddy_config:

secrets:
  cargo_config:
    file: ${HOME}/.cargo/config.toml
